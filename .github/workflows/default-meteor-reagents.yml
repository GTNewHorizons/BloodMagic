name: Compress Default Meteor Configs

on:
  push:
    branches: [ master ]
    paths: [ raw/meteor-reagents/* ]
  workflow_dispatch: { }

jobs:
  meteors:
    name: Compress Default Meteor Reagent Configs
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Compress Default Meteor Reagent Configs
        run: python .github/scripts/compress.py meteor-reagents meteors/reagents.zip
      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: Compress Default Meteor Reagent Configs
          body: Automated changes by Compress Default Meteor Reagent Configs workflow.
          commit-message: Compress Default Meteor Reagent Configs
          delete-branch: true
          branch: meteor-reagents-configs/patch
